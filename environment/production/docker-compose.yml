# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  Ghost Blog Service — Production Compose                                   │
# │  Usage: docker compose up -d                                               │
# │  Admin: https://blog.yourdomain.com/ghost                                 │
# └──────────────────────────────────────────────────────────────────────────────┘

name: ghost-prod

services:
  # ── Ghost CMS ───────────────────────────────────────────────────────────────
  ghost-prod:
    image: ${GHOST_IMAGE:-ghost:5.130.6-alpine}
    container_name: ghost-prod
    restart: always
    depends_on:
      mysql-prod:
        condition: service_healthy
    ports:
      - "${GHOST_PORT:-2368}:2368"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      url: ${GHOST_URL:?GHOST_URL is required}
      database__client: mysql
      database__connection__host: mysql-prod
      database__connection__port: 3306
      database__connection__user: ${MYSQL_USER:?MYSQL_USER is required}
      database__connection__password: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      database__connection__database: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      # ── Mail ────────────────────────────────────────────────────────────────
      mail__transport: ${MAIL_TRANSPORT:-SMTP}
      mail__options__host: ${MAIL_HOST:?MAIL_HOST is required}
      mail__options__port: ${MAIL_PORT:-587}
      mail__options__secure: ${MAIL_SECURE:-false}
      mail__options__auth__user: ${MAIL_USER:?MAIL_USER is required}
      mail__options__auth__pass: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      mail__from: ${MAIL_FROM:?MAIL_FROM is required}
    volumes:
      - ${GHOST_CONTENT_PATH:-./volumes/ghost/content}:/var/lib/ghost/content
    networks:
      - ghost-network-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2368/ghost/api/admin/site/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql-prod:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: ghost-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=128M --max-connections=100
    volumes:
      - ${MYSQL_DATA_PATH:-./volumes/mysql/data}:/var/lib/mysql
    networks:
      - ghost-network-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  ghost-network-prod:
    driver: bridge
